/* HERO SECTION */

.hero{
display:flex;
align-items:center;
justify-content:center;
gap:60px;
margin-top:60px;
flex-wrap:wrap;
padding:20px;
}

.hero-text{
max-width:450px;
animation:fadeIn 1.2s ease;
}

.hero-text h2{
font-size:30px;
color:#1f2937;
margin-bottom:10px;
}

.hero-text p{
color:#555;
margin-bottom:25px;
font-size:16px;
}

/* HERO IMAGE */

.hero img{
width:360px;
animation:float 3s ease-in-out infinite;
}

/* FLOAT ANIMATION */

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0px);}
}

/* FADE ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* FEATURES SECTION */

.features{

box-shadow:0 6px 20px rgba(0,0,0,0.1);

transition:0.3s;
}

.feature-card:hover{

}

.feature-card img{
width:60px;
margin-bottom:12px;

}

}

</style>
