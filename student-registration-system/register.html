
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register Student</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>Student Registration System</h1>
</header>


<div class="container">

<div class="form-card">

<h2>Register Student</h2>
<p class="subtitle">Fill the details below to register a new student</p>

<form id="studentForm">

<div class="form-group">
<label for="name">Student Name</label>
<input type="text" id="name" placeholder="Enter student name" required>
</div>

<div class="form-group">
<label for="roll">Roll Number</label>
<input type="text" id="roll" placeholder="Enter roll number" required>
</div>

<div class="form-group">
<label for="email">Email</label>
<input type="email" id="email" placeholder="Enter email address" required>
</div>

<div class="form-group">
<label for="course">Course</label>
<input type="text" id="course" placeholder="Enter course name" required>
</div>

<div class="form-actions">
<button type="submit" class="btn">Register Student</button>
<a href="index.html" class="btn back-btn">Back</a>
</div>

</form>

<div id="successMessage"></div>

</div>

</div>


<script src="js/script.js"></script>

</body>
</html>
